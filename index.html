<script>
window.addEventListener('load',()=>{
const video=document.getElementById('mainVideo');
const poster=document.getElementById('videoPoster');
const loader=document.getElementById('loadingOverlay');
const btn=document.getElementById('unmuteBtn');
video.muted=true;
video.play().catch(()=>{});
function ready(){if(poster){poster.style.display='none';}if(loader)loader.style.display='none';btn.style.display='block';}
video.addEventListener('playing',ready,{once:true});
video.addEventListener('timeupdate',()=>{if(video.currentTime>0.05)ready();},{once:true});
btn.onclick=()=>{video.muted=false;btn.style.display='none';};
});
</script>
